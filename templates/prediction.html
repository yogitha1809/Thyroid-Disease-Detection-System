<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction - Thyroid Disease Detection</title>


<link rel="stylesheet" href="{{ url_for('static', filename='prediction.css') }}">


</head>
<body>

<div class="navbar">
    <h2>Thyroid Prediction</h2>


<div>
    <a href="/" class="nav-btn">Home</a>
    <a href="/history" class="nav-btn">History</a>
    <a href="/logout" class="logout-btn">Logout</a>
</div>


</div>

<div class="container">


<div class="card">

    <h2>Enter Patient Details</h2>

    <form action="/predict" method="POST">

        <label>Age</label>
        <input type="number"
               name="age"
               min="1"
               max="120"
               required>

        <label>Gender</label>

        <select name="sex" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>TSH (mIU/L)</label>
        <input type="number"
               step="0.01"
               name="TSH"
               min="0"
               required>

        <label>T3 (ng/dL)</label>
        <input type="number"
               step="0.01"
               name="T3"
               min="0"
               required>

        <label>TT4 (µg/dL)</label>
        <input type="number"
               step="0.01"
               name="TT4"
               min="0"
               required>

        <button type="submit" class="predict-btn">
            Predict Disease
        </button>

    </form>

</div>

<div class="card">

    <h2>Upload Lab Report</h2>

    <form action="/upload_pdf"
          method="POST"
          enctype="multipart/form-data">

        <input type="file"
               name="pdf_file"
               accept=".pdf"
               required>

        <button type="submit" class="upload-btn">
            Upload PDF & Predict
        </button>

    </form>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Thyroid Disease Detection System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
</head>

<body>

<div class="auth-box">

    

    <h2>Thyroid Disease Detection System</h2>

    <p>Create Your Account</p>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Choose Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Choose Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <a href="/login">
        Already have an account? Login
    </a>

</div>

</body>
</html>
